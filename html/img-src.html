<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Img src</title>
    <style>
        button {
         background-color: black; 
         color: white;  
        }
    </style>
    <script>
        function changeImage() { 
            let myImg=document.getElementById("myImg");
            myImg.src="img/scenery2.jpg";
        }
        
    </script>
</head>
<body>
    <h2>Scenery:</h2>
    <img id="myImg" src="img/scenery1.jpg" alt="">
    <br /><br />
    
    <button onclick="changeImage()">change Image</button>
    
</body>
</html>
