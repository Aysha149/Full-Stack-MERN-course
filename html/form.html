<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      form {
        width: 500px;
      }
      .form {
        max-width: 800px;
      }
      div {
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <h1 class="text-center my-3 fw-bold text-primary">Registration Form</h1>
    <form action="" class="border shadow-lg p-4 rounded mx-auto">
      <div class="mb-3">
        <label for="nameTextBox" class="form-label">First Name:</label>
        <input
          type="text"
          name="nameTextBox"
          id="nameTextBox"
          placeholder="Enter Your Name"
          class="form-control"
        />
      </div>

      <div class="mb-3">
        <label for="nameTextBox" class="form-label">Last Name:</label>
        <input
          type="text"
          name="nameTextBox"
          id="nameTextBox"
          placeholder="Enter Your Name"
          class="form-control"
        />
      </div>
      <div class="mb-3">
        <label for="emailTextBox" class="form-label">Email Adress:</label>
        <input
          type="text"
          name="nameTextBox"
          id="nameTextBox"
          placeholder="Enter Email Adress"
          class="form-control"
        />
      </div>
      <div class="mb-3">
        <label for="passwordTextBox" class="form-label">Password:</label>
        <input
          type="text"
          name="nameTextBox"
          id="nameTextBox"
          placeholder="Enter The Password"
          class="form-control"
        />
      </div>
      <div class="mb-3">
        <label for="passwordTextBox" class="form-label">Retype Password:</label>
        <input
          type="text"
          name="nameTextBox"
          id="nameTextBox"
          placeholder="Retype The Password"
          class="form-control"
        />
      </div>
      <div class="mb-3">
        <label for="contactTextBox" class="form-label">Contact Number:</label>
        <input
          type="text"
          name="nameTextBox"
          id="nameTextBox"
          placeholder="Enter The Number"
          class="form-control"
        />
      </div>
      <div class="mb-3">
        <label for="genderTextBox" class="form-label">Gender:</label>
        <input
          type="text"
          name="nameTextBox"
          id="nameTextBox"
          placeholder="Enter Your Gender"
          class="form-control"
        />
      </div>
      <div>
        <button class="btn btn-primary w-100">SUBMIT</button>
      </div>
    </form>
  </body>
</html>
